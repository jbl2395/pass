<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワード管理</title>
<link rel="apple-touch-icon" id="touch-icon">
<script>
(function(){
  const c=document.createElement('canvas');
  c.width=c.height=180;
  const ctx=c.getContext('2d');
  const r=40;
  ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(180-r,0);
  ctx.quadraticCurveTo(180,0,180,r);
  ctx.lineTo(180,180-r);ctx.quadraticCurveTo(180,180,180-r,180);
  ctx.lineTo(r,180);ctx.quadraticCurveTo(0,180,0,180-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();ctx.clip();
  const g=ctx.createLinearGradient(0,0,0,180);
  g.addColorStop(0,'#FF2D9B');g.addColorStop(1,'#C0005A');
  ctx.fillStyle=g;ctx.fillRect(0,0,180,180);
  const sh=ctx.createRadialGradient(90,20,5,90,20,100);
  sh.addColorStop(0,'rgba(255,255,255,0.55)');
  sh.addColorStop(0.5,'rgba(255,255,255,0.12)');
  sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh;ctx.fillRect(0,0,180,90);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.font='bold 52px Arial Black,Arial,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Pass',91,94);
  ctx.fillStyle='#fff';
  ctx.fillText('Pass',90,92);
  document.getElementById('touch-icon').href=c.toDataURL('image/png');
})();
</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PASS">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

/* ===== THEMES ===== */
:root {
  --bg-grad-a: #1a8fff;
  --bg-grad-b: #0070f3;
  --bg-grad-c: #0050c8;
  --accent: #0070f3;
  --accent-light: #74c0fc;
}
[data-theme="hotpink"] { --bg-grad-a:#ff2d9b;--bg-grad-b:#e0006e;--bg-grad-c:#b0004f;--accent:#ff2d9b;--accent-light:#ffadd8; }
[data-theme="coral"]   { --bg-grad-a:#ff6b35;--bg-grad-b:#f7391a;--bg-grad-c:#c8200a;--accent:#ff6b35;--accent-light:#ffbb99; }
[data-theme="gold"]    { --bg-grad-a:#ffb300;--bg-grad-b:#e09000;--bg-grad-c:#b86c00;--accent:#ffb300;--accent-light:#ffe08a; }
[data-theme="lime"]    { --bg-grad-a:#00c853;--bg-grad-b:#009e3d;--bg-grad-c:#007028;--accent:#00c853;--accent-light:#80f0aa; }
[data-theme="cyan"]    { --bg-grad-a:#00b4d8;--bg-grad-b:#0090bb;--bg-grad-c:#006a90;--accent:#00b4d8;--accent-light:#80dcee; }
[data-theme="violet"]  { --bg-grad-a:#7c3aed;--bg-grad-b:#6020d0;--bg-grad-c:#4400a8;--accent:#7c3aed;--accent-light:#c4b5fd; }
[data-theme="crimson"] { --bg-grad-a:#e11d48;--bg-grad-b:#be0039;--bg-grad-c:#8c0028;--accent:#e11d48;--accent-light:#fda4af; }
[data-theme="midnight"]{ --bg-grad-a:#0a0a1a;--bg-grad-b:#0d1440;--bg-grad-c:#060820;--accent:#818cf8;--accent-light:#c7d2fe; }

/* ===== BASE ===== */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:linear-gradient(160deg,var(--bg-grad-a) 0%,var(--bg-grad-b) 60%,var(--bg-grad-c) 100%);
  min-height:100vh;padding:24px 16px 100px;
  transition:background 0.5s;
}

/* ===== HEADER ===== */
header{text-align:center;padding:28px 0 26px;position:relative}
.logo{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.22);border-radius:50px;padding:10px 28px;margin-bottom:8px;backdrop-filter:blur(8px);}
header h1{font-size:1.2rem;font-weight:700;color:#fff;letter-spacing:0.05em}
header p{color:rgba(255,255,255,0.5);font-size:0.72rem;margin-top:5px}
.gear-btn{position:absolute;top:32px;right:16px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.55);border-radius:50%;width:38px;height:38px;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;backdrop-filter:blur(6px);}
.gear-btn:hover{background:rgba(255,255,255,0.2);color:#fff;transform:rotate(30deg)}

/* ===== SEARCH ===== */
.search-wrap{max-width:560px;margin:0 auto 30px;position:relative}
.search-wrap input{width:100%;background:#fff;border:2.5px solid #fff;border-radius:50px;padding:14px 22px 14px 52px;color:#1a2540;font-family:inherit;font-size:0.95rem;outline:none;box-shadow:0 4px 24px rgba(0,0,0,0.18);transition:border-color 0.2s,box-shadow 0.2s;}
.search-wrap input:focus{border-color:var(--accent-light);box-shadow:0 6px 32px rgba(37,99,235,0.22)}
.search-wrap input::placeholder{color:#a0aec0}
.search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:1.1rem;pointer-events:none}

/* ===== GRID ===== */
.categories{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:18px;max-width:1200px;margin:0 auto;}

/* ===== CARD SHELL ===== */
.category-section{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(20,50,100,0.12);border:2px solid #e2e8f0;transition:box-shadow 0.2s,transform 0.15s;}
.category-section:hover{box-shadow:0 6px 32px rgba(20,50,100,0.20);transform:translateY(-2px)}

/* ===== CAT HEADER ===== */
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;border-bottom:2px solid #e2e8f0;transition:background 0.15s;}
.cat-header:hover{filter:brightness(0.97)}
.cat-header-left{display:flex;align-items:center;gap:10px}
.cat-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.cat-title{font-size:0.9rem;font-weight:700}
.cat-count{font-size:0.7rem;font-weight:700;padding:2px 9px;border-radius:20px;color:#fff;}
.cat-header-right{display:flex;align-items:center;gap:6px}
.collapse-icon{font-size:0.7rem;color:#94a3b8;transition:transform 0.25s;display:inline-block;margin-left:2px;}
.collapsed .collapse-icon{transform:rotate(-90deg)}
.add-btn{width:30px;height:30px;border-radius:8px;border:none;color:#fff;cursor:pointer;font-size:1.2rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;background:rgba(0,0,0,0.15);}
.add-btn:hover{opacity:0.78;transform:scale(1.1)}
.del-cat-btn{background:none;border:none;cursor:pointer;font-size:0.75rem;color:rgba(0,0,0,0.2);padding:2px 5px;border-radius:5px;transition:color 0.15s;}
.del-cat-btn:hover{color:#f87171}

/* ===== ENTRIES LIST ===== */
.entries-list{padding:12px 12px 8px;background:#fff}
.entries-list.collapsed-body{display:none}

/* ===== ENTRY CARD ===== */
.entry-card{border-radius:10px;padding:12px 14px;margin-bottom:9px;border:1.5px solid #e2e8f0;background:#f4f7ff;transition:border-color 0.18s,box-shadow 0.15s;border-left-width:5px;}
.entry-card:hover{border-color:#bfdbfe;box-shadow:0 2px 10px rgba(37,99,235,0.10)}

.entry-name{font-size:0.9rem;font-weight:700;color:#1a2540;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:7px;border-bottom:1.5px solid #e2e8f0;cursor:pointer;}
.entry-actions{display:flex;gap:4px;align-items:center;}
.del-btn{background:none;border:none;cursor:pointer;font-size:0.82rem;color:#c8cedd;padding:2px 4px;border-radius:5px;transition:color 0.15s;}
.del-btn:hover{color:#f87171}
.edit-btn{background:none;border:1.5px solid #e2e8f0;cursor:pointer;font-size:0.68rem;color:#6a7a9a;padding:2px 8px;border-radius:5px;transition:all 0.15s;white-space:nowrap;}
.edit-btn:hover{background:#eff6ff;border-color:#93c5fd;color:#2563eb}

/* ===== ENTRY FIELDS ===== */
.entry-row{display:flex;align-items:center;gap:6px;font-size:0.78rem;margin-bottom:5px}
.entry-row .label{min-width:80px;max-width:80px;font-size:0.68rem;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;}
.entry-row .value{font-family:'JetBrains Mono',monospace;color:#1a2540;font-size:0.77rem;word-break:break-all;}
.entry-row .masked{font-family:'JetBrains Mono',monospace;color:#94a3b8;letter-spacing:0.12em;}
.copy-btn{background:none;border:1.5px solid #e2e8f0;color:#6a7a9a;cursor:pointer;font-size:0.68rem;padding:1px 8px;border-radius:5px;margin-left:auto;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.copy-btn:hover{background:#eff6ff;border-color:#93c5fd;color:#2563eb}
.toggle-pw{background:none;border:1px solid #e2e8f0;cursor:pointer;font-size:0.68rem;color:#6a7a9a;padding:1px 7px;border-radius:5px;transition:all 0.15s;flex-shrink:0;font-family:inherit;}
.toggle-pw:hover{background:#eff6ff;border-color:#93c5fd;color:#2563eb}

.entry-body{display:none;margin-top:8px;padding-top:8px;border-top:1px solid #e2e8f0}
.entry-body.open{display:block}
.entry-toggle-icon{font-size:0.75rem;color:#94a3b8;margin-left:4px;transition:transform 0.2s;display:inline-block}
.entry-name.opened .entry-toggle-icon{transform:rotate(90deg)}

/* ===== ADD / EDIT FORM ===== */
.add-form{border-radius:10px;padding:14px;margin-bottom:10px;display:none;flex-direction:column;gap:8px;border:2px dashed #bfdbfe;background:#f8faff;}
.add-form.open{display:flex}
.form-row{display:flex;flex-direction:column;gap:3px}
.form-label{font-size:0.71rem;color:#6a7a9a;font-weight:600}
.add-form input,.add-form textarea{background:#fff;border:2px solid #e2e8f0;border-radius:8px;padding:8px 11px;color:#1a2540;font-family:inherit;font-size:0.84rem;outline:none;width:100%;transition:border-color 0.2s;}
.add-form input:focus,.add-form textarea:focus{border-color:#93c5fd}
.add-form textarea{resize:vertical;min-height:54px}
.form-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
.btn-save{border:none;border-radius:8px;color:#fff;padding:8px 20px;font-family:inherit;font-size:0.84rem;font-weight:700;cursor:pointer;background:var(--accent);transition:opacity 0.15s;}
.btn-save:hover{opacity:0.82}
.btn-cancel{background:#fff;border:2px solid #e2e8f0;border-radius:8px;color:#6a7a9a;padding:8px 14px;font-family:inherit;font-size:0.84rem;cursor:pointer;transition:all 0.15s;}
.btn-cancel:hover{border-color:#93c5fd;color:#2563eb}

/* インライン編集フォーム */
.inline-edit-form{display:none;margin-top:10px;padding:12px;background:#f0f7ff;border-radius:8px;border:2px solid #bfdbfe;flex-direction:column;gap:8px;}
.inline-edit-form.open{display:flex}
.inline-edit-form input,.inline-edit-form textarea{background:#fff;border:2px solid #e2e8f0;border-radius:8px;padding:7px 10px;color:#1a2540;font-family:inherit;font-size:0.82rem;outline:none;width:100%;transition:border-color 0.2s;}
.inline-edit-form input:focus,.inline-edit-form textarea:focus{border-color:#93c5fd}
.inline-edit-form textarea{resize:vertical;min-height:48px}
.inline-edit-form .form-label{font-size:0.68rem;color:#6a7a9a;font-weight:600}

.no-results{text-align:center;color:#b0bcd4;font-size:0.82rem;padding:16px 0 8px}
.hidden{display:none!important}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a6bbf;color:#fff;padding:10px 26px;border-radius:50px;font-size:0.82rem;opacity:0;transition:all 0.28s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.15);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== BACK TO TOP ===== */
.back-top{position:fixed;bottom:24px;right:20px;z-index:100;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.28);color:rgba(255,255,255,0.75);backdrop-filter:blur(8px);border-radius:50%;width:40px;height:40px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 2px 12px rgba(0,0,0,0.15);opacity:0;pointer-events:none;}
.back-top.visible{opacity:1;pointer-events:auto}
.back-top:hover{background:rgba(255,255,255,0.3);color:#fff;transform:translateY(-2px)}

/* ===== LOCK SCREEN ===== */
.lock-screen{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,var(--bg-grad-a) 0%,var(--bg-grad-b) 60%,var(--bg-grad-c) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.lock-box{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:340px;box-shadow:0 8px 40px rgba(0,0,0,0.22);text-align:center;}
.lock-icon{font-size:2.8rem;margin-bottom:12px}
.lock-title{font-size:1.1rem;font-weight:700;color:#1a2540;margin-bottom:6px}
.lock-sub{font-size:0.78rem;color:#7a82a0;margin-bottom:22px}
.lock-input{width:100%;background:#f4f7ff;border:2px solid #dce6f5;border-radius:10px;padding:12px 16px;font-size:1rem;font-family:inherit;outline:none;text-align:center;letter-spacing:0.2em;margin-bottom:14px;transition:border-color 0.2s;}
.lock-input:focus{border-color:#3b82f6}
.lock-btn{width:100%;background:#3b82f6;color:#fff;border:none;border-radius:10px;padding:12px;font-size:0.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity 0.15s;margin-bottom:10px;}
.lock-btn:hover{opacity:0.85}
.lock-set-btn{width:100%;background:none;color:#7a82a0;border:2px solid #dce6f5;border-radius:10px;padding:10px;font-size:0.84rem;font-family:inherit;cursor:pointer;transition:all 0.15s;}
.lock-set-btn:hover{border-color:#3b82f6;color:#3b82f6}
.lock-error{color:#f87171;font-size:0.8rem;margin-bottom:10px;min-height:18px}

/* ===== SETTINGS MODAL ===== */
.modal-overlay{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal-box{background:#fff;border-radius:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,0.28);transform:translateY(20px);transition:transform 0.25s;}
.modal-overlay.open .modal-box{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:2px solid #e2e8f0;}
.modal-title{font-size:1rem;font-weight:700;color:#1a2540}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.2rem;color:#94a3b8;transition:color 0.15s;}
.modal-close:hover{color:#ef4444}
.modal-body{padding:20px}
.modal-section{margin-bottom:22px}
.modal-section-title{font-size:0.75rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.theme-swatch{border-radius:10px;aspect-ratio:1;cursor:pointer;border:3px solid transparent;transition:all 0.18s;display:flex;align-items:flex-end;padding:5px;font-size:0.6rem;color:#fff;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,0.5);}
.theme-swatch:hover{transform:scale(1.06)}
.theme-swatch.active{border-color:#fff;box-shadow:0 0 0 3px rgba(0,0,0,0.2)}
.io-btns{display:flex;flex-direction:column;gap:8px}
.io-btn{display:flex;align-items:center;gap:10px;background:#f4f7ff;border:2px solid #e2e8f0;border-radius:10px;padding:12px 16px;cursor:pointer;font-family:inherit;font-size:0.88rem;font-weight:600;color:#1a2540;transition:all 0.15s;width:100%;}
.io-btn:hover{border-color:var(--accent-light);background:#eff6ff;color:var(--accent)}
.io-btn-icon{font-size:1.2rem}
.io-btn-sub{font-size:0.7rem;color:#94a3b8;font-weight:400;margin-top:1px}
.io-btn-texts{text-align:left}
.add-cat-form{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.add-cat-form input{background:#f4f7ff;border:2px solid #e2e8f0;border-radius:8px;padding:9px 12px;color:#1a2540;font-family:inherit;font-size:0.84rem;outline:none;transition:border-color 0.2s;}
.add-cat-form input:focus{border-color:#93c5fd}
.add-cat-submit{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px;font-family:inherit;font-size:0.84rem;font-weight:700;cursor:pointer;transition:opacity 0.15s;}
.add-cat-submit:hover{opacity:0.85}
#importFileInput{display:none}
</style>
</head>
<body>

<!-- ===== LOCK SCREEN ===== -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">パスワード管理</div>
    <div class="lock-sub" id="lockSub">パスワードを入力してください</div>
    <input class="lock-input" type="password" id="lockInput" placeholder="••••••" maxlength="20"
      onkeydown="if(event.key==='Enter')unlockApp()">
    <div class="lock-error" id="lockError"></div>
    <button class="lock-btn" onclick="unlockApp()">ロック解除</button>
    <button class="lock-set-btn" onclick="changePassword()">パスワードを変更する</button>
  </div>
</div>

<!-- ===== SETTINGS MODAL ===== -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">⚙️ 設定</span>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">🎨 デザイン（テーマ）</div>
        <div class="theme-grid" id="themeGrid"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">📦 データ管理</div>
        <div class="io-btns">
          <button class="io-btn" onclick="exportJSON()">
            <span class="io-btn-icon">⬇️</span>
            <div class="io-btn-texts"><div>エクスポート（JSON）</div><div class="io-btn-sub">テキストエディタで編集可能</div></div>
          </button>
          <button class="io-btn" onclick="exportCSV()">
            <span class="io-btn-icon">📊</span>
            <div class="io-btn-texts"><div>エクスポート（CSV）</div><div class="io-btn-sub">Excel・スプレッドシートで編集可能</div></div>
          </button>
          <button class="io-btn" onclick="document.getElementById('importFileInput').click()">
            <span class="io-btn-icon">⬆️</span>
            <div class="io-btn-texts"><div>インポート</div><div class="io-btn-sub">JSON / CSV ファイルを読み込む</div></div>
          </button>
          <input type="file" id="importFileInput" accept=".json,.csv" onchange="importFile(event)">
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">➕ カテゴリを追加</div>
        <div class="add-cat-form">
          <input type="text" id="newCatIcon" placeholder="絵文字（例: 🏠）" maxlength="4">
          <input type="text" id="newCatLabel" placeholder="カテゴリ名（例: 家族用アカウント系）">
          <button class="add-cat-submit" onclick="addCustomCategory()">カテゴリを追加する</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== MAIN UI ===== -->
<header>
  <button class="gear-btn" onclick="openSettings()" title="設定">⚙️</button>
  <div class="logo"><span>🔐</span><h1>パスワード管理</h1></div>
  <p>データはこの端末のブラウザのみに保存されます</p>
</header>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input type="text" id="searchInput" placeholder="例）アマ・ama → Amazon にもヒット" oninput="filterEntries()">
</div>

<div class="categories" id="categoriesContainer"></div>
<div class="toast" id="toast"></div>
<button class="back-top" id="backTop" onclick="scrollToTop()" title="トップへ戻る">▲</button>

<script>
/* ========================================================
   THEMES
======================================================== */
const THEMES = [

/* ========================================================
   FUZZY SEARCH（修正済み：カタカナ→ローマ字変換対応）
======================================================== */
function toHira(s){ return s.replace(/[\u30A1-\u30F6]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60)); }
function toKata(s){ return s.replace(/[\u3041-\u3096]/g,c=>String.fromCharCode(c.charCodeAt(0)+0x60)); }

const ROMAJI_MAP=[
  ['amazon','アマゾン'],['amaz','アマゾン'],['ama','アマ'],['ama','amazon'],
  ['apple','アップル'],['google','グーグル'],['yahoo','ヤフー'],
  ['twitter','ツイッター'],['instagram','インスタ'],['insta','インスタ'],
  ['facebook','フェイスブック'],['line','ライン'],['rakuten','楽天'],
  ['paypay','ペイペイ'],['docomo','ドコモ'],['softbank','ソフトバンク'],
  ['fusion','フュージョン'],['autodesk','オートデスク'],
];

// カタカナ→ローマ字変換テーブル
const KATA2ROM=[
  ['アマ','ama'],['アマゾン','amazon'],['アップル','apple'],['グーグル','google'],
  ['ヤフー','yahoo'],['ツイッター','twitter'],['インスタ','instagram'],
  ['フェイスブック','facebook'],['ライン','line'],['楽天','rakuten'],
  ['ペイペイ','paypay'],['ドコモ','docomo'],['ソフトバンク','softbank'],
  ['ア','a'],['イ','i'],['ウ','u'],['エ','e'],['オ','o'],
  ['カ','ka'],['キ','ki'],['ク','ku'],['ケ','ke'],['コ','ko'],
  ['サ','sa'],['シ','shi'],['ス','su'],['セ','se'],['ソ','so'],
  ['タ','ta'],['チ','chi'],['ツ','tsu'],['テ','te'],['ト','to'],
  ['ナ','na'],['ニ','ni'],['ヌ','nu'],['ネ','ne'],['ノ','no'],
  ['ハ','ha'],['ヒ','hi'],['フ','fu'],['ヘ','he'],['ホ','ho'],
  ['マ','ma'],['ミ','mi'],['ム','mu'],['メ','me'],['モ','mo'],
  ['ヤ','ya'],['ユ','yu'],['ヨ','yo'],
  ['ラ','ra'],['リ','ri'],['ル','ru'],['レ','re'],['ロ','ro'],
  ['ワ','wa'],['ヲ','wo'],['ン','n'],
  ['ガ','ga'],['ギ','gi'],['グ','gu'],['ゲ','ge'],['ゴ','go'],
  ['ザ','za'],['ジ','ji'],['ズ','zu'],['ゼ','ze'],['ゾ','zo'],
  ['ダ','da'],['デ','de'],['ド','do'],['バ','ba'],['ビ','bi'],
  ['ブ','bu'],['ベ','be'],['ボ','bo'],['パ','pa'],['ピ','pi'],
  ['プ','pu'],['ペ','pe'],['ポ','po'],['ッ',''],['ー',''],
];

function kata2rom(s){
  let r=toKata(s);
  KATA2ROM.forEach(([k,v])=>{ r=r.split(k).join(v); });
  return r;
}

function fuzzyMatch(text,query){
  const t=text.toLowerCase();
  const q=query.toLowerCase().trim();
  if(!q)return true;
  const v=new Set([q,toHira(q),toKata(q)]);
  const qRom=kata2rom(q);
  if(qRom) v.add(qRom);
  for(const[r,k]of ROMAJI_MAP){
    if(r.startsWith(q)||q.startsWith(r)||r.startsWith(qRom)||qRom.startsWith(r)){
      v.add(k);v.add(toHira(k));v.add(r);
    }
  }
  for(const x of v){
    if(!x)continue;
    if(t.includes(x)||toHira(t).includes(x)||toKata(t).includes(x))return true;
  }
  return false;
}

function exportJSON(){
  const cats=getCats(); const data=loadData();
  const out={categories:cats,entries:data,exportedAt:new Date().toISOString()};
  downloadFile('passwords_backup.json',JSON.stringify(out,null,2),'application/json');
  toast('JSONをエクスポートしました');
}
function exportCSV(){
  const cats=getCats(); const data=loadData();
  const rows=[['カテゴリ','フィールド名','値']];
  cats.forEach(cat=>{
    (data[cat.id]||[]).forEach(entry=>{
      Object.entries(entry).forEach(([k,v])=>{ rows.push([cat.label,k,v]); });
    });
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  downloadFile('passwords_backup.csv','\uFEFF'+csv,'text/csv');
  toast('CSVをエクスポートしました');
}
function downloadFile(name,content,type){
  const blob=new Blob([content],{type});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=name;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importFile(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const text=e.target.result;
    if(file.name.endsWith('.json')) importJSON(text);
    else if(file.name.endsWith('.csv')) importCSV(text);
    else toast('JSON または CSV ファイルを選択してください');
  };
  reader.readAsText(file,'UTF-8');
  event.target.value='';
}
function importJSON(text){
  try{
    const obj=JSON.parse(text);
    if(obj.categories) saveCatMeta(obj.categories);
    if(obj.entries) saveData(obj.entries);
    closeSettings(); renderAll();
    toast('インポートが完了しました！');
  }catch{ toast('JSONファイルの読み込みに失敗しました'); }
}
function importCSV(text){
  const clean=text.replace(/^\uFEFF/,'');
  const lines=clean.split(/\r?\n/).filter(l=>l.trim());
  const cats=getCats(); const data=loadData();
  lines.slice(1).forEach(line=>{
    const cols=parseCSVLine(line);
    if(cols.length<3)return;
    const [catLabel,fieldName,value]=cols;
    const cat=cats.find(c=>c.label===catLabel);
    if(!cat)return;
    if(!data[cat.id])data[cat.id]=[];
    const entries=data[cat.id];
    const isFirstField=['サービス名','書類・カード名','端末名','システム名'].includes(fieldName);
if(entries.length===0||isFirstField) entries.push({});

    entries[entries.length-1][fieldName]=value;
  });
  const finalData={};
  Object.entries(data).forEach(([k,v])=>{
    finalData[k]=v.map(e=>{ const {_csvImportDone,...rest}=e; return rest; });
  });
  saveData(finalData); closeSettings(); renderAll();
  toast('CSVインポートが完了しました！');
}
function parseCSVLine(line){
  const result=[];let current='';let inQuote=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){ if(inQuote&&line[i+1]==='"'){current+='"';i++;}else{inQuote=!inQuote;} }
    else if(ch===','&&!inQuote){ result.push(current);current=''; }
    else{ current+=ch; }
  }
  result.push(current);
  return result;
}

const CAT_PALETTE=[

  {bg:'#fff8e6',border:'#f5e89a',accent:'#f6d860',dark:'#c9a800'},

function renderAll(){
  const c=document.getElementById('categoriesContainer');
  c.innerHTML='';
  getCats().forEach(cat=>c.appendChild(buildSection(cat)));
}

function buildSection(cat){
  const allCats=getCats();
  const catIndex=allCats.findIndex(c=>c.id===cat.id);
  const style=getCatStyle(catIndex>=0?catIndex:0);
  const entries=getData(cat.id);
  const isCollapsed=localStorage.getItem('pm_collapsed_'+cat.id)==='1';

  const sec=document.createElement('div');
  sec.className='category-section';
  sec.dataset.catId=cat.id;
  sec.style.borderColor=style.border;
  sec.style.borderWidth='2px';
  if(isCollapsed)sec.classList.add('collapsed');

  const hdr=document.createElement('div');
  hdr.className='cat-header';
  hdr.style.background=style.bg;
  hdr.style.borderBottomColor=style.border;
  hdr.innerHTML=`
    <div class="cat-header-left">
      <div class="cat-icon" style="background:${style.accent}">${cat.icon}</div>
      <span class="cat-title" style="color:${style.dark}">${cat.label}</span>
      <span class="cat-count" style="background:${style.dark}" id="count-${cat.id}">${entries.length}</span>
      <span class="collapse-icon">▼</span>
    </div>
    <div class="cat-header-right">
      <button class="add-btn" style="background:${style.accent};color:${style.dark}" title="新規追加" onclick="toggleForm('${cat.id}',event)">＋</button>
      ${cat.custom?`<button class="del-cat-btn" onclick="event.stopPropagation();deleteCategory('${cat.id}')" title="カテゴリを削除">🗑</button>`:''}
    </div>`;
  hdr.addEventListener('click',function(e){
    if(e.target.closest('.add-btn,.del-cat-btn'))return;
    const collapsed=sec.classList.toggle('collapsed');
    localStorage.setItem('pm_collapsed_'+cat.id,collapsed?'1':'0');
  });
  sec.appendChild(hdr);

  const list=document.createElement('div');
  list.className='entries-list'+(isCollapsed?' collapsed-body':'');
  list.id=`list-${cat.id}`;
  list.appendChild(buildForm(cat,style));

  if(entries.length===0){
    const empty=document.createElement('div');
    empty.className='no-results';empty.id=`empty-${cat.id}`;
    empty.textContent='まだ登録がありません';
    list.appendChild(empty);
  } else {
    entries.forEach((entry,i)=>list.appendChild(buildCard(cat,entry,i,style)));
  }
  sec.appendChild(list);

  const obs=new MutationObserver(()=>{
    if(sec.classList.contains('collapsed')) list.classList.add('collapsed-body');
    else list.classList.remove('collapsed-body');
  });
  obs.observe(sec,{attributes:true,attributeFilter:['class']});

  return sec;
}

function buildForm(cat,style){
  const form=document.createElement('div');
  form.className='add-form';form.id=`form-${cat.id}`;
  cat.fields.forEach(f=>{
    const row=document.createElement('div');
    row.className='form-row';
    const isBig=f==='備考';const isSens=SENSITIVE.includes(f);
    row.innerHTML=`<div class="form-label">${f}</div>
      ${isBig?`<textarea data-field="${f}" placeholder="${f}を入力"></textarea>`
             :`<input type="${isSens?'password':'text'}" data-field="${f}" placeholder="${f}を入力">`}`;
    form.appendChild(row);
  });
  const btns=document.createElement('div');
  btns.className='form-btns';
  btns.innerHTML=`<button class="btn-cancel" onclick="toggleForm('${cat.id}',event)">キャンセル</button> <button class="btn-save" style="background:${style.dark}" onclick="saveEntry('${cat.id}')">保存する</button>`;
  form.appendChild(btns);
  return form;
}

function buildCard(cat,entry,idx,style){
  const card=document.createElement('div');
  card.className='entry-card';
  // 検索用データ（フィールド値＋フィールド名も含める）
  card.dataset.search=Object.values(entry).join(' ')+' '+Object.keys(entry).join(' ');
  card.style.borderLeftColor=style.accent;

  const nameField=cat.fields[0];
  const name=(entry[nameField]||'(無題)').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  let rows='';
  cat.fields.forEach(f=>{
    if(!entry[f])return;
    const isSens=SENSITIVE.includes(f);
    const safe=entry[f].replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const disp=entry[f].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(isSens){
      rows+=`<div class="entry-row"><span class="label" style="background:${style.bg};color:${style.dark};border-color:${style.border}">${f}</span><span class="masked" data-val="${entry[f].replace(/"/g,'&quot;')}">••••••</span><button class="toggle-pw" onclick="toggleMask(this)">表示</button><button class="copy-btn" onclick="copyText('${safe}')">コピー</button></div>`;
    } else {
      rows+=`<div class="entry-row"><span class="label" style="background:${style.bg};color:${style.dark};border-color:${style.border}">${f}</span><span class="value">${disp}</span><button class="copy-btn" onclick="copyText('${safe}')">コピー</button></div>`;
    }
  });

  card.innerHTML=`
    <div class="entry-name" onclick="toggleCard(this)">
      <span>${name}<span class="entry-toggle-icon">▶</span></span>
      <div class="entry-actions">
        <button class="edit-btn" onclick="event.stopPropagation();toggleInlineEdit('${cat.id}',${idx},this)">✏️ 編集</button>
        <button class="del-btn" onclick="event.stopPropagation();deleteEntry('${cat.id}',${idx})">🗑</button>
      </div>
    </div>
    <div class="entry-body">
      ${rows}
      <div class="inline-edit-form" id="inline-edit-${cat.id}-${idx}">
        ${cat.fields.map(f=>{
          const isBig=f==='備考';const isSens=SENSITIVE.includes(f);
          const val=(entry[f]||'').replace(/"/g,'&quot;');
          return `<div class="form-row">
            <div class="form-label">${f}</div>
            ${isBig?`<textarea data-field="${f}">${entry[f]||''}</textarea>`
                   :`<input type="${isSens?'password':'text'}" data-field="${f}" value="${val}">`}
          </div>`;
        }).join('')}
        <div class="form-btns">
          <button class="btn-cancel" onclick="closeInlineEdit('${cat.id}',${idx})">キャンセル</button>
          <button class="btn-save" style="background:${style.dark}" onclick="saveInlineEdit('${cat.id}',${idx})">更新する</button>
        </div>
      </div>
    </div>`;
  return card;
}

function toggleInlineEdit(catId,idx,btn){
  const form=document.getElementById(`inline-edit-${catId}-${idx}`);
  const entryBody=form.closest('.entry-body');
  // 小枠を開く
  entryBody.classList.add('open');
  const nameEl=entryBody.previousElementSibling;
  nameEl.classList.add('opened');
  // 編集フォームを開く
  form.classList.toggle('open');
  if(form.classList.contains('open')){
    form.querySelector('input,textarea')?.focus();
  }
}

function closeInlineEdit(catId,idx){
  const form=document.getElementById(`inline-edit-${catId}-${idx}`);
  form.classList.remove('open');
}

function saveInlineEdit(catId,idx){
  const form=document.getElementById(`inline-edit-${catId}-${idx}`);
  const entries=getData(catId);
  const entry={};
  form.querySelectorAll('[data-field]').forEach(el=>{
    if(el.value.trim()) entry[el.dataset.field]=el.value.trim();
  });
  if(!Object.keys(entry).length){toast('内容を入力してください');return;}
  entries[idx]=entry;
  setData(catId,entries);
  toast('更新しました！');
  renderAll();
  filterEntries();
}

function toggleMask(btn){
  const span=btn.previousElementSibling;
  if(span.textContent==='••••••'){span.textContent=span.dataset.val;btn.textContent='非表示';}
  else{span.textContent='••••••';btn.textContent='表示';}
}

function toggleCard(nameEl){
  nameEl.nextElementSibling.classList.toggle('open');
  nameEl.classList.toggle('opened');
}

function toggleForm(catId,e){
  e.stopPropagation();
  const form=document.getElementById(`form-${catId}`);
  form.classList.toggle('open');
  if(form.classList.contains('open')){
    form.querySelectorAll('input,textarea').forEach(i=>i.value='');
    form.querySelector('input,textarea')?.focus();
  }
}

function saveEntry(catId){
  const form=document.getElementById(`form-${catId}`);
  const entry={};
  form.querySelectorAll('[data-field]').forEach(el=>{if(el.value.trim())entry[el.dataset.field]=el.value.trim();});
  if(!Object.keys(entry).length){toast('内容を入力してください');return;}
  const entries=getData(catId);
  entries.unshift(entry);
  setData(catId,entries);
  toast('登録しました！');
  renderAll();filterEntries();
}

function deleteEntry(catId,idx){
  if(!confirm('このエントリを削除しますか？'))return;
  const entries=getData(catId);
  entries.splice(idx,1);
  setData(catId,entries);
  toast('削除しました');
  renderAll();filterEntries();
}

/* ========================================================
   FILTER（修正済み：ヒット時に小枠を自動で開く）
======================================================== */
function filterEntries(){
  const q=document.getElementById('searchInput').value.trim();
  getCats().forEach(cat=>{
    const sec=document.querySelector(`[data-cat-id="${cat.id}"]`);
    const list=document.getElementById(`list-${cat.id}`);
    if(!list)return;
    const cards=list.querySelectorAll('.entry-card');
    let visible=0;
    cards.forEach(card=>{
      const match=fuzzyMatch(card.dataset.search||card.textContent,q);
      card.classList.toggle('hidden',!match);
      if(match){
        visible++;
        // 検索ヒット時に小枠を自動で開く
        if(q){
          const entryBody=card.querySelector('.entry-body');
          const nameEl=card.querySelector('.entry-name');
          if(entryBody&&!entryBody.classList.contains('open')){
            entryBody.classList.add('open');
            nameEl.classList.add('opened');
          }
        } else {
          // 検索クリア時は閉じる
          const entryBody=card.querySelector('.entry-body');
          const nameEl=card.querySelector('.entry-name');
          if(entryBody){
            entryBody.classList.remove('open');
            nameEl.classList.remove('opened');
          }
        }
      }
    });
    const empty=document.getElementById(`empty-${cat.id}`);
    if(empty)empty.classList.toggle('hidden',getData(cat.id).length>0||!!q);
    sec.classList.toggle('hidden',!!q&&visible===0);
    // 検索時はカテゴリを開く
    if(q&&visible>0&&sec){
      sec.classList.remove('collapsed');
      list.classList.remove('collapsed-body');
    }
  });
}

/* ========================================================
   TOAST / UTILS
======================================================== */
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2200);
}
function copyText(text){ navigator.clipboard.writeText(text).then(()=>toast('コピーしました！')); }

const backTop=document.getElementById('backTop');
window.addEventListener('scroll',()=>{ backTop.classList.toggle('visible',window.scrollY>300); });
function scrollToTop(){ window.scrollTo({top:0,behavior:'smooth'}); }

/* ========================================================
   INIT
======================================================== */
window.addEventListener('load',function(){
  const savedTheme=localStorage.getItem('pm_theme')||'ocean';
  if(savedTheme!=='ocean') document.documentElement.dataset.theme=savedTheme;
  if(!loadCatMeta()) saveCatMeta(DEFAULT_CATEGORIES);
  if(!localStorage.getItem('pm_lock_pass')){
    document.getElementById('lockSub').textContent='初期パスワード: 1234（後で変更してください）';
  }
  document.getElementById('lockInput').focus();
  renderAll();
});
</script>
